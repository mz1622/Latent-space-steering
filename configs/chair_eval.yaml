# Configuration for CHAIR evaluation

experiment:
  name: "chair_evaluation"
  seed: 42
  debug: false
  max_samples: 500  # CHAIR typically uses 500 images

model:
  name: "liuhaotian/llava-v1.5-7b"
  model_base: null
  conv_mode: "llava_v1"
  device: "auto"

data:
  data_file: "./data/MSCOCO/"
  split: "val2014"

# Steering (optional - for testing steering effect on CHAIR)
steering:
  method: "mean_difference"
  config:
    alpha_image: 0.9
    alpha_text: 0.9
    rank: 1

# Generation for CHAIR (detailed captions)
generation:
  max_new_tokens: 512
  do_sample: false
  num_beams: 1

output:
  base_dir: "./outputs"
  save_predictions: true
