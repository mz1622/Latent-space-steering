# Configuration for POPE evaluation

experiment:
  name: "pope_evaluation"
  seed: 42
  debug: false
  max_samples: null  # Set to int for quick testing

model:
  name: "liuhaotian/llava-v1.5-7b"
  model_base: null
  conv_mode: "llava_v1"
  device: "auto"

data:
  data_file: "./data/MSCOCO/"
  pope_type: "random"  # random, popular, adversarial

# Steering (optional - for testing steering effect on POPE)
steering:
  method: "mean_difference"
  config:
    alpha_image: 0.9
    alpha_text: 0.9
    rank: 1

# Generation for POPE (short answers)
generation:
  max_new_tokens: 32
  do_sample: false
  num_beams: 1

output:
  base_dir: "./outputs"
  save_predictions: true
